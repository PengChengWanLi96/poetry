# AI\u8BD7\u8BCD\u5206\u6790\u914D\u7F6E\u6587\u4EF6\u793A\u4F8B
# \u4F7F\u7528\u65B9\u5F0F\uFF1A
# 1. \u590D\u5236\u6B64\u6587\u4EF6\u4E3A application-ai.properties
# 2. \u586B\u5165\u4F60\u7684\u5B9E\u9645API\u5BC6\u94A5
# 3. \u5728 application.properties \u4E2D\u5BFC\u5165\u6B64\u914D\u7F6E\uFF1Aspring.profiles.include=ai
# 4. \u6216\u76F4\u63A5\u5C06\u914D\u7F6E\u6DFB\u52A0\u5230 application.properties \u4E2D

# ==================== AI\u529F\u80FD\u5F00\u5173 ====================
# \u662F\u5426\u542F\u7528AI\u529F\u80FD\uFF08\u9ED8\u8BA4true\uFF09
poetry.ai.enabled=true

# \u9ED8\u8BA4\u4F7F\u7528\u7684AI\u6A21\u578B (openai/wenxin/qianwen/xinghuo)
# \u53EA\u9700\u542F\u7528\u4E00\u79CD\u6A21\u578B\u5373\u53EF
poetry.ai.default-model=qianwen

# ==================== OpenAI\u914D\u7F6E\u793A\u4F8B ====================
# \u542F\u7528OpenAI\u65F6\u53D6\u6D88\u4E0B\u9762\u7684\u6CE8\u91CA\u5E76\u914D\u7F6E
# poetry.ai.models.openai.api-key=sk-your-openai-api-key-here
# poetry.ai.models.openai.model=gpt-3.5-turbo
# poetry.ai.models.openai.timeout=60
# poetry.ai.models.openai.temperature=0.7

# ==================== \u767E\u5EA6\u6587\u5FC3\u4E00\u8A00\u914D\u7F6E\u793A\u4F8B ====================
# \u542F\u7528\u6587\u5FC3\u4E00\u8A00\u65F6\u53D6\u6D88\u4E0B\u9762\u7684\u6CE8\u91CA\u5E76\u914D\u7F6E
# poetry.ai.models.wenxin.api-key=your-wenxin-api-key
# poetry.ai.models.wenxin.api-secret=your-wenxin-secret-key
# poetry.ai.models.wenxin.model=ERNIE-Bot-4
# poetry.ai.models.wenxin.timeout=60

# ==================== \u963F\u91CC\u901A\u4E49\u5343\u95EE\u914D\u7F6E\u793A\u4F8B ====================
# \u542F\u7528\u901A\u4E49\u5343\u95EE\u65F6\u53D6\u6D88\u4E0B\u9762\u7684\u6CE8\u91CA\u5E76\u914D\u7F6E
# poetry.ai.models.qianwen.api-key=sk-your-dashscope-api-key
# poetry.ai.models.qianwen.model=qwen-turbo
# poetry.ai.models.qianwen.timeout=60

# ==================== \u8BAF\u98DE\u661F\u706B\u914D\u7F6E\u793A\u4F8B ====================
# \u542F\u7528\u8BAF\u98DE\u661F\u706B\u65F6\u53D6\u6D88\u4E0B\u9762\u7684\u6CE8\u91CA\u5E76\u914D\u7F6E
# poetry.ai.models.xinghuo.extra.appId=your-xinghuo-app-id
# poetry.ai.models.xinghuo.api-key=your-xinghuo-api-key
# poetry.ai.models.xinghuo.api-secret=your-xinghuo-api-secret
# poetry.ai.models.xinghuo.model=generalv3.5
# poetry.ai.models.xinghuo.timeout=60

# ==================== \u914D\u7F6E\u63D0\u793A ====================
# 1. \u9ED8\u8BA4\u542F\u7528AI\u529F\u80FD\uFF0C\u4F46\u672A\u914D\u7F6E\u4EFB\u4F55\u6A21\u578B\u65F6\uFF0C\u754C\u9762\u4F1A\u663E\u793A"\u89E3\u6790\u670D\u52A1\u6B63\u5728\u5F00\u53D1\u4E2D"
# 2. \u9009\u62E9\u4E00\u79CD\u6A21\u578B\u542F\u7528\u5373\u53EF\uFF0C\u4E0D\u9700\u8981\u914D\u7F6E\u6240\u6709\u6A21\u578B
# 3. \u4FEE\u6539 poetry.ai.default-model \u6765\u5207\u6362\u4F7F\u7528\u7684\u6A21\u578B
# 4. API Key\u8BF7\u59A5\u5584\u4FDD\u7BA1\uFF0C\u4E0D\u8981\u4E0A\u4F20\u5230\u4EE3\u7801\u4ED3\u5E93
# 5. \u56FD\u5185\u7528\u6237\u5EFA\u8BAE\u4F7F\u7528\u767E\u5EA6\u6587\u5FC3\u6216\u963F\u91CC\u901A\u4E49\u5343\u95EE

# ==================== \u914D\u7F6E\u63D0\u793A ====================
# 1. \u8BF7\u786E\u4FDD\u81F3\u5C11\u914D\u7F6E\u4E00\u4E2A\u53EF\u7528\u7684AI\u6A21\u578B
# 2. \u56FD\u5185\u7528\u6237\u5EFA\u8BAE\u4F7F\u7528\u767E\u5EA6\u6587\u5FC3\u6216\u963F\u91CC\u901A\u4E49\u5343\u95EE
# 3. API Key\u8BF7\u59A5\u5584\u4FDD\u7BA1\uFF0C\u4E0D\u8981\u4E0A\u4F20\u5230\u4EE3\u7801\u4ED3\u5E93
# 4. \u751F\u4EA7\u73AF\u5883\u5EFA\u8BAE\u4F7F\u7528\u73AF\u5883\u53D8\u91CF\u6CE8\u5165\u654F\u611F\u4FE1\u606F
# 5. \u5404\u5E73\u53F0\u90FD\u6709\u514D\u8D39\u989D\u5EA6\u9650\u5236\uFF0C\u6CE8\u610F\u67E5\u770B\u5B98\u65B9\u6587\u6863