spring.application.name=poetry
server.port=8866

#spring.elasticsearch.uris=http://119.29.133.12:92
#spring.elasticsearch.username=elastic
#spring.elasticsearch.password=your_password
spring.elasticsearch.uris=http://localhost:9200

# ??????????
logging.charset.console=UTF-8
# ???????????
logging.charset.file=UTF-8
# ??????????????????
logging.file.name=logs/poetry.log

# \u6570\u636E\u6E90\u914D\u7F6E
spring.datasource.url=jdbc:mysql://localhost:3306/poetry?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.sql.init.schema-locations=classpath:sql/schema.sql
#spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:sql/data.sql

# MyBatis-Plus\u914D\u7F6E
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
mybatis-plus.type-aliases-package=com.fpj.poetry.domain
mybatis-plus.global-config.db-config.id-type=auto
# \u903B\u8F91\u5220\u9664\u65F6\uFF0C\u6807\u8BB0\u201C\u5DF2\u5220\u9664\u201D\u7684\u5B57\u6BB5\u503C\u3002
mybatis-plus.global-config.db-config.logic-delete-value=1
# \u903B\u8F91\u5220\u9664\u65F6\uFF0C\u6807\u8BB0\u201C\u672A\u5220\u9664\u201D\u7684\u5B57\u6BB5\u503C\u3002
mybatis-plus.global-config.db-config.logic-not-delete-value=0
# \u5F00\u542F\u9A7C\u5CF0\u547D\u540D\u8F6C\u6362
mybatis-plus.configuration.map-underscore-to-camel-case=true
# \u7981\u7528Mybatis\u7684\u4E8C\u7EA7\u7F13\u5B58
mybatis-plus.configuration.cache-enabled=false
# \u6253\u5370SQL,\u53C2\u6570\u548C\u7ED3\u679C\uFF0C\u4FBF\u4E8E\u5F00\u53D1\u8C03\u8BD5
#mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# \u5F00\u53D1\u73AF\u5883\u4FDD\u7559 StdOutImpl\uFF0C\u751F\u4EA7\u73AF\u5883\u6539\u4E3A\uFF1A
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
