<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词详情 - 诗词大全</title>
    <style>
        @font-face {
            font-family: 'Custom KaiTi';
            src: local('KaiTi'), local('STKaiti'), local('AR PL UKai CN'), local('SimSun');
        }

        @font-face {
            font-family: 'Custom SongTi';
            src: local('Songti SC'), local('SimSun'), local('STSong');
        }

        :root {
            --primary-color: #8B4513;
            --secondary-color: #D4A574;
            --bg-color: #FDF8F3;
            --text-color: #3D3D3D;
            --accent-color: #C41E3A;
            --paper-color: #FAF6F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23d4a574' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"),
                radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 69, 19, 0.03) 0%, transparent 50%);
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(139, 69, 19, 0.9);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(107, 52, 16, 0.95);
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 主容器 */
        .detail-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 诗词卡片 */
        .poetry-detail-card {
            background: var(--paper-color);
            border-radius: 8px;
            padding: 60px 50px;
            box-shadow: 
                0 10px 40px rgba(139, 69, 19, 0.1),
                0 0 0 1px rgba(139, 69, 19, 0.05),
                inset 0 0 60px rgba(139, 69, 19, 0.02);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease;
            margin-bottom: 40px;
        }

        /* 装饰边框 */
        .poetry-detail-card::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(139, 69, 19, 0.15);
            border-radius: 4px;
            pointer-events: none;
        }

        /* 角落装饰 */
        .corner-decoration {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(139, 69, 19, 0.2);
        }

        .corner-decoration.top-left {
            top: 25px;
            left: 25px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.top-right {
            top: 25px;
            right: 25px;
            border-left: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-left {
            bottom: 25px;
            left: 25px;
            border-right: none;
            border-top: none;
        }

        .corner-decoration.bottom-right {
            bottom: 25px;
            right: 25px;
            border-left: none;
            border-top: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 诗词标题 */
        .poetry-title {
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", sans-serif;
            font-size: 42px;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 8px;
            position: relative;
            padding-bottom: 20px;
        }

        .poetry-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--secondary-color), transparent);
        }

        /* 作者信息 */
        .poetry-meta {
            text-align: center;
            margin-bottom: 40px;
            color: #888;
            font-size: 16px;
        }

        .poetry-meta .dynasty {
            display: inline-block;
            padding: 4px 12px;
            background: var(--secondary-color);
            color: #fff;
            border-radius: 12px;
            font-size: 13px;
            margin-right: 10px;
        }

        .poetry-meta .author {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: 500;
        }

        /* 诗词内容 */
        .poetry-content {
            font-family: "Custom KaiTi", "KaiTi", "STKaiti", "AR PL UKai CN", "SimSun", serif;
            font-size: 26px;
            line-height: 2.2;
            color: var(--text-color);
            text-align: center;
            white-space: pre-wrap;
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            position: relative;
        }

        /* 引号装饰 */
        .poetry-content::before,
        .poetry-content::after {
            content: '"';
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", serif;
            font-size: 60px;
            color: rgba(139, 69, 19, 0.15);
            position: absolute;
            line-height: 1;
        }

        .poetry-content::before {
            top: 10px;
            left: 20px;
        }

        .poetry-content::after {
            content: '"';
            bottom: 0px;
            right: 20px;
            transform: rotate(180deg);
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            color: var(--secondary-color);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--secondary-color), transparent);
            max-width: 150px;
        }

        .divider span {
            padding: 0 20px;
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", serif;
        }

        /* 标签区域 */
        .poetry-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px dashed rgba(139, 69, 19, 0.2);
        }

        .poetry-tag {
            padding: 6px 16px;
            background: rgba(139, 69, 19, 0.08);
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 69, 19, 0.1);
        }

        .poetry-tag:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-2px);
        }

        /* 加载动画 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 69, 19, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: var(--primary-color);
            font-size: 16px;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-icon {
            font-size: 80px;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .error-message {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* 印章效果 */
        .seal {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            border: 3px solid var(--accent-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
            color: var(--accent-color);
            font-size: 14px;
            transform: rotate(-15deg);
            opacity: 0.6;
        }

        /* ============ AI解析区域样式 ============ */
        .ai-analysis-section {
            background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(139, 69, 19, 0.08);
            border: 1px solid rgba(139, 69, 19, 0.1);
            margin-top: 20px;
        }

        .ai-analysis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(139, 69, 19, 0.1);
        }

        .ai-analysis-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            color: var(--primary-color);
            font-weight: 600;
        }

        .ai-analysis-title svg {
            width: 32px;
            height: 32px;
            color: #4A90E2;
        }

        .ai-analysis-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #A0522D);
            color: #fff;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #ccc;
        }

        .btn-secondary {
            background: rgba(139, 69, 19, 0.1);
            color: var(--primary-color);
            border: 1px solid rgba(139, 69, 19, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(139, 69, 19, 0.2);
        }

        /* 分析内容 */
        .analysis-content {
            display: none;
        }

        .analysis-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .analysis-section {
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            border-left: 4px solid var(--secondary-color);
        }

        .analysis-section:last-child {
            margin-bottom: 0;
        }

        .analysis-section-title {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .analysis-section-title::before {
            content: '◆';
            color: var(--secondary-color);
            font-size: 12px;
        }

        .analysis-section-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-color);
            text-align: justify;
        }

        /* 生成中状态 */
        .generating-status {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
        }

        .generating-status.active {
            display: flex;
        }

        .generating-animation {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            position: relative;
        }

        .generating-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(74, 144, 226, 0.2);
            border-top-color: #4A90E2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .generating-text {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .generating-subtext {
            font-size: 14px;
            color: #888;
        }

        /* 信息提示状态 */
        .analysis-info {
            display: none;
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .analysis-info.active {
            display: block;
        }

        .analysis-info-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .analysis-info-title {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .analysis-info-desc {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }

        /* 友好的提示样式 */
        .friendly-message {
            display: none;
            text-align: center;
            padding: 50px 20px;
            background: rgba(139, 69, 19, 0.03);
            border-radius: 10px;
            border: 1px dashed rgba(139, 69, 19, 0.2);
        }

        .friendly-message.active {
            display: block;
        }

        .friendly-message-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .friendly-message-text {
            font-size: 16px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .friendly-message-hint {
            font-size: 14px;
            color: #888;
        }

        /* 元信息 */
        .analysis-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(139, 69, 19, 0.2);
            font-size: 13px;
            color: #888;
        }

        .analysis-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .back-btn {
                top: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 14px;
            }

            .detail-container {
                padding: 70px 15px 40px;
            }

            .poetry-detail-card {
                padding: 40px 25px;
            }

            .poetry-title {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .poetry-content {
                font-size: 20px;
                padding: 20px 15px;
                line-height: 2;
            }

            .poetry-content::before,
            .poetry-content::after {
                font-size: 40px;
            }

            .corner-decoration {
                width: 25px;
                height: 25px;
            }

            .seal {
                width: 45px;
                height: 45px;
                font-size: 11px;
                bottom: 25px;
                right: 25px;
            }

            /* AI分析移动端 */
            .ai-analysis-section {
                padding: 25px 20px;
            }

            .ai-analysis-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .ai-analysis-title {
                font-size: 20px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .analysis-section {
                padding: 20px 15px;
            }

            .analysis-section-title {
                font-size: 16px;
            }

            .analysis-section-content {
                font-size: 14px;
            }
        }

        /* 打印样式 */
        @media print {
            .back-btn,
            .ai-analysis-actions {
                display: none;
            }

            body {
                background: white;
            }

            .poetry-detail-card,
            .ai-analysis-section {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>

    <div class="detail-container">
        <!-- 加载中 -->
        <div id="loading" class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载诗词...</div>
        </div>

        <!-- 诗词详情 -->
        <div id="poetry-detail" class="poetry-detail-card" style="display: none;">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>
            
            <h1 class="poetry-title" id="title"></h1>
            
            <div class="poetry-meta">
                <span class="dynasty" id="dynasty"></span>
                <span class="author" id="author"></span>
            </div>
            
            <div class="divider">
                <span>❦</span>
            </div>
            
            <div class="poetry-content" id="content"></div>
            
            <div class="divider">
                <span>❦</span>
            </div>
            
            <div class="poetry-tags" id="tags"></div>
            
            <div class="seal">诗词</div>
        </div>

        <!-- AI解析区域 -->
        <div id="ai-analysis-section" class="ai-analysis-section" style="display: none;">
            <div class="ai-analysis-header">
                <div class="ai-analysis-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>AI 智能赏析</span>
                </div>
                <div class="ai-analysis-actions">
                    <button id="btn-analyze" class="btn btn-primary" onclick="generateAnalysis()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                            <path d="M16 16h5v5"/>
                        </svg>
                        开始解析
                    </button>
                </div>
            </div>

            <!-- 初始状态提示 -->
            <div id="analysis-info" class="analysis-info active">
                <div class="analysis-info-icon">✨</div>
                <div class="analysis-info-title">智能诗词赏析</div>
                <div class="analysis-info-desc">点击下方按钮，AI将为您深度解析这首诗词的背景、意境与艺术手法</div>
            </div>

            <!-- 生成中状态 -->
            <div id="generating-status" class="generating-status">
                <div class="generating-animation"></div>
                <div class="generating-text">AI正在深度分析中...</div>
                <div class="generating-subtext">请稍候，分析完成后将自动显示</div>
            </div>

            <!-- 分析结果内容 -->
            <div id="analysis-content" class="analysis-content">
                <div id="dynasty-section" class="analysis-section" style="display: none;">
                    <div class="analysis-section-title">朝代背景</div>
                    <div class="analysis-section-content" id="dynasty-content"></div>
                </div>

                <div id="author-section" class="analysis-section" style="display: none;">
                    <div class="analysis-section-title">作者介绍</div>
                    <div class="analysis-section-content" id="author-content"></div>
                </div>

                <div id="background-section" class="analysis-section" style="display: none;">
                    <div class="analysis-section-title">创作背景</div>
                    <div class="analysis-section-content" id="background-content"></div>
                </div>

                <div id="content-section" class="analysis-section" style="display: none;">
                    <div class="analysis-section-title">诗词大意</div>
                    <div class="analysis-section-content" id="content-analysis"></div>
                </div>

                <div id="artistic-section" class="analysis-section" style="display: none;">
                    <div class="analysis-section-title">艺术手法</div>
                    <div class="analysis-section-content" id="artistic-content"></div>
                </div>

                <div class="analysis-meta">
                    <span id="analysis-model">AI模型：-</span>
                    <span id="analysis-time">生成时间：-</span>
                </div>
            </div>

            <!-- 友好的提示信息（服务不可用） -->
            <div id="friendly-message" class="friendly-message">
                <div class="friendly-message-icon">📝</div>
                <div class="friendly-message-text">解析服务正在开发中</div>
                <div class="friendly-message-hint">敬请期待，我们将为您提供更优质的诗词赏析体验</div>
            </div>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="error-container" style="display: none;">
            <div class="error-icon">✕</div>
            <div class="error-message" id="error-message">加载失败</div>
            <a href="/" class="back-btn" style="position: static; display: inline-flex;">返回首页</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/poetry';
        let currentPoetryId = null;
        let currentPoetry = null;
        let aiEnabled = false;

        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            // 首先加载诗词详情
            loadPoetryDetail();
        });

        // 加载诗词详情
        async function loadPoetryDetail() {
            const id = getUrlParam('id');
            
            if (!id) {
                showError('缺少诗词ID参数');
                return;
            }

            currentPoetryId = id;

            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    currentPoetry = result.data;
                    displayPoetry(currentPoetry);
                    // 显示AI分析区域并检查AI状态和数据
                    document.getElementById('ai-analysis-section').style.display = 'block';
                    initAIAnalysis();
                } else {
                    showError(result.message || '诗词不存在');
                }
            } catch (error) {
                console.error('Error loading poetry:', error);
                showError('网络错误，请稍后重试');
            }
        }

        // 初始化AI分析区域
        async function initAIAnalysis() {
            // 1. 先检查AI功能是否开启
            try {
                const checkResponse = await fetch(`${API_BASE}/analysis/check_enable`);
                if (checkResponse.ok) {
                    const checkResult = await checkResponse.json();
                    if (checkResult.code === 200) {
                        aiEnabled = checkResult.data === true;
                    }
                }
            } catch (error) {
                console.log('检查AI功能状态失败');
                aiEnabled = false;
            }

            // 更新按钮状态
            const btn = document.getElementById('btn-analyze');
            if (!aiEnabled) {
                btn.disabled = true;
                btn.innerHTML = '解析服务未开启';
            }

            // 2. 检查是否已有分析数据（无论AI是否开启，都查询已有数据）
            try {
                const existsResponse = await fetch(`${API_BASE}/analysis/${currentPoetryId}/exists`);
                if (existsResponse.ok) {
                    const existsResult = await existsResponse.json();
                    if (existsResult.code === 200 && existsResult.data) {
                        const analysis = existsResult.data;
                        // 如果有分析数据且status=1（已完成），直接显示
                        if (analysis.status === 1) {
                            displayAnalysis(analysis);
                            return;
                        }
                        // 如果正在生成中，显示生成中状态并轮询
                        else if (analysis.status === 0) {
                            showAnalysisState('generating-status');
                            btn.style.display = 'none';
                            setTimeout(checkAnalysisComplete, 3000);
                            return;
                        }
                    }
                }
            } catch (error) {
                console.log('查询分析数据失败');
            }

            // 没有已有数据，显示初始状态
            showAnalysisState('analysis-info');
        }

        // 检查分析是否完成
        async function checkAnalysisComplete() {
            if (!currentPoetryId) return;
            
            try {
                const response = await fetch(`${API_BASE}/analysis/${currentPoetryId}/exists`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200 && result.data) {
                        const analysis = result.data;
                        if (analysis.status === 1) {
                            // 完成，显示结果
                            displayAnalysis(analysis);
                            return;
                        } else if (analysis.status === 0) {
                            // 仍在生成中，继续轮询
                            setTimeout(checkAnalysisComplete, 3000);
                            return;
                        }
                    }
                }
            } catch (error) {
                console.log('检查分析状态失败');
            }
            
            // 出错或状态异常，显示初始状态
            showAnalysisState('analysis-info');
            document.getElementById('btn-analyze').style.display = aiEnabled ? 'inline-flex' : 'none';
        }

        // 显示诗词
        function displayPoetry(poetry) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('poetry-detail').style.display = 'block';

            // 设置标题
            document.getElementById('title').textContent = poetry.title || '无题';
            
            // 设置朝代
            const dynastyEl = document.getElementById('dynasty');
            if (poetry.dynasty) {
                dynastyEl.textContent = poetry.dynasty;
                dynastyEl.style.display = 'inline-block';
            } else {
                dynastyEl.style.display = 'none';
            }
            
            // 设置作者
            document.getElementById('author').textContent = poetry.author || '无名氏';
            
            // 设置内容
            document.getElementById('content').textContent = poetry.content || '';
            
            // 设置标签
            const tagsContainer = document.getElementById('tags');
            try {
                const tags = JSON.parse(poetry.tags || '[]');
                if (tags && tags.length > 0) {
                    tagsContainer.innerHTML = tags.map(tag => 
                        `<span class="poetry-tag">${tag}</span>`
                    ).join('');
                } else {
                    tagsContainer.style.display = 'none';
                }
            } catch (e) {
                tagsContainer.style.display = 'none';
            }

            // 更新页面标题
            document.title = `${poetry.title} - ${poetry.author || '无名氏'} - 诗词大全`;
        }

        // 显示AI分析状态
        function showAnalysisState(state) {
            // 隐藏所有状态
            document.getElementById('analysis-info').classList.remove('active');
            document.getElementById('generating-status').classList.remove('active');
            document.getElementById('analysis-content').classList.remove('active');
            document.getElementById('friendly-message').classList.remove('active');
            
            // 显示指定状态
            document.getElementById(state).classList.add('active');
        }

        // 生成分析
        async function generateAnalysis() {
            if (!currentPoetryId || !aiEnabled) return;

            // 显示生成中状态
            showAnalysisState('generating-status');
            document.getElementById('btn-analyze').style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/analysis/${currentPoetryId}`, { 
                    method: 'POST' 
                });
                
                if (!response.ok) {
                    showFriendlyMessage();
                    return;
                }
                
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    const analysis = result.data;
                    // 如果status=1（已完成），直接显示
                    if (analysis.status === 1) {
                        displayAnalysis(analysis);
                    } else {
                        // 异步生成中，开始轮询
                        setTimeout(checkAnalysisComplete, 3000);
                    }
                } else {
                    showFriendlyMessage();
                }
            } catch (error) {
                console.error('生成分析失败:', error);
                showFriendlyMessage();
            }
        }

        // 显示友好提示
        function showFriendlyMessage() {
            showAnalysisState('friendly-message');
            document.getElementById('btn-analyze').style.display = 'none';
        }

        // 显示分析结果
        function displayAnalysis(analysis) {
            showAnalysisState('analysis-content');

            // 填充内容
            fillAnalysisSection('dynasty', analysis.dynastyAnalysis);
            fillAnalysisSection('author', analysis.authorAnalysis);
            fillAnalysisSection('background', analysis.backgroundAnalysis);
            fillAnalysisSection('content-analysis', analysis.contentAnalysis);
            fillAnalysisSection('artistic', analysis.artisticAnalysis);

            // 更新元信息
            if (analysis.aiModel) {
                document.getElementById('analysis-model').textContent = `AI模型：${analysis.aiModel}`;
            }
            if (analysis.createdAt) {
                document.getElementById('analysis-time').textContent = `生成时间：${formatDate(analysis.createdAt)}`;
            }

            // 隐藏按钮
            document.getElementById('btn-analyze').style.display = 'none';
        }

        // 填充分析小节
        function fillAnalysisSection(sectionId, content) {
            const section = document.getElementById(`${sectionId}-section`);
            const contentDiv = document.getElementById(`${sectionId}-content`);
            
            if (content && content.trim()) {
                contentDiv.innerHTML = formatContent(content);
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        }

        // 格式化内容（处理换行等）
        function formatContent(content) {
            if (!content) return '';
            return content
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }
    </script>
</body>
</html>
