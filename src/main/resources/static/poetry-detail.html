<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词详情 - 诗词大全</title>
    <style>
        @font-face {
            font-family: 'Custom KaiTi';
            src: local('KaiTi'), local('STKaiti'), local('AR PL UKai CN'), local('SimSun');
        }

        @font-face {
            font-family: 'Custom SongTi';
            src: local('Songti SC'), local('SimSun'), local('STSong');
        }

        :root {
            --primary-color: #8B4513;
            --secondary-color: #D4A574;
            --bg-color: #FDF8F3;
            --text-color: #3D3D3D;
            --accent-color: #C41E3A;
            --paper-color: #FAF6F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23d4a574' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"),
                radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 69, 19, 0.03) 0%, transparent 50%);
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(139, 69, 19, 0.9);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", "SimSun", serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(107, 52, 16, 0.95);
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 主容器 */
        .detail-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 诗词卡片 */
        .poetry-detail-card {
            background: var(--paper-color);
            border-radius: 8px;
            padding: 60px 50px;
            box-shadow: 
                0 10px 40px rgba(139, 69, 19, 0.1),
                0 0 0 1px rgba(139, 69, 19, 0.05),
                inset 0 0 60px rgba(139, 69, 19, 0.02);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease;
        }

        /* 装饰边框 */
        .poetry-detail-card::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(139, 69, 19, 0.15);
            border-radius: 4px;
            pointer-events: none;
        }

        /* 角落装饰 */
        .corner-decoration {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(139, 69, 19, 0.2);
        }

        .corner-decoration.top-left {
            top: 25px;
            left: 25px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.top-right {
            top: 25px;
            right: 25px;
            border-left: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-left {
            bottom: 25px;
            left: 25px;
            border-right: none;
            border-top: none;
        }

        .corner-decoration.bottom-right {
            bottom: 25px;
            right: 25px;
            border-left: none;
            border-top: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 诗词标题 */
        .poetry-title {
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", sans-serif;
            font-size: 42px;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 8px;
            position: relative;
            padding-bottom: 20px;
        }

        .poetry-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--secondary-color), transparent);
        }

        /* 作者信息 */
        .poetry-meta {
            text-align: center;
            margin-bottom: 40px;
            color: #888;
            font-size: 16px;
        }

        .poetry-meta .dynasty {
            display: inline-block;
            padding: 4px 12px;
            background: var(--secondary-color);
            color: #fff;
            border-radius: 12px;
            font-size: 13px;
            margin-right: 10px;
        }

        .poetry-meta .author {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: 500;
        }

        /* 诗词内容 */
        .poetry-content {
            font-family: "Custom KaiTi", "KaiTi", "STKaiti", "AR PL UKai CN", "SimSun", serif;
            font-size: 26px;
            line-height: 2.2;
            color: var(--text-color);
            text-align: center;
            white-space: pre-wrap;
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            position: relative;
        }

        /* 引号装饰 */
        .poetry-content::before,
        .poetry-content::after {
            content: '"';
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", serif;
            font-size: 60px;
            color: rgba(139, 69, 19, 0.15);
            position: absolute;
            line-height: 1;
        }

        .poetry-content::before {
            top: 10px;
            left: 20px;
        }

        .poetry-content::after {
            content: '"';
            bottom: 0px;
            right: 20px;
            transform: rotate(180deg);
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            color: var(--secondary-color);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--secondary-color), transparent);
            max-width: 150px;
        }

        .divider span {
            padding: 0 20px;
            font-family: "Custom SongTi", "Source Han Serif SC", "Songti SC", serif;
        }

        /* 标签区域 */
        .poetry-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px dashed rgba(139, 69, 19, 0.2);
        }

        .poetry-tag {
            padding: 6px 16px;
            background: rgba(139, 69, 19, 0.08);
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 69, 19, 0.1);
        }

        .poetry-tag:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-2px);
        }

        /* 加载动画 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 69, 19, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: var(--primary-color);
            font-size: 16px;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-icon {
            font-size: 80px;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .error-message {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* 印章效果 */
        .seal {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            border: 3px solid var(--accent-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
            color: var(--accent-color);
            font-size: 14px;
            transform: rotate(-15deg);
            opacity: 0.6;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .back-btn {
                top: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 14px;
            }

            .detail-container {
                padding: 70px 15px 40px;
            }

            .poetry-detail-card {
                padding: 40px 25px;
            }

            .poetry-title {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .poetry-content {
                font-size: 20px;
                padding: 20px 15px;
                line-height: 2;
            }

            .poetry-content::before,
            .poetry-content::after {
                font-size: 40px;
            }

            .corner-decoration {
                width: 25px;
                height: 25px;
            }

            .seal {
                width: 45px;
                height: 45px;
                font-size: 11px;
                bottom: 25px;
                right: 25px;
            }
        }

        /* 打印样式 */
        @media print {
            .back-btn {
                display: none;
            }

            body {
                background: white;
            }

            .poetry-detail-card {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>

    <div class="detail-container">
        <div id="loading" class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载诗词...</div>
        </div>

        <div id="poetry-detail" class="poetry-detail-card" style="display: none;">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>
            
            <h1 class="poetry-title" id="title"></h1>
            
            <div class="poetry-meta">
                <span class="dynasty" id="dynasty"></span>
                <span class="author" id="author"></span>
            </div>
            
            <div class="divider">
                <span>❦</span>
            </div>
            
            <div class="poetry-content" id="content"></div>
            
            <div class="divider">
                <span>❦</span>
            </div>
            
            <div class="poetry-tags" id="tags"></div>
            
            <div class="seal">诗词</div>
        </div>

        <div id="error" class="error-container" style="display: none;">
            <div class="error-icon">✕</div>
            <div class="error-message" id="error-message">加载失败</div>
            <a href="/" class="back-btn" style="position: static; display: inline-flex;">返回首页</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/poetry';

        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 加载诗词详情
        async function loadPoetryDetail() {
            const id = getUrlParam('id');
            
            if (!id) {
                showError('缺少诗词ID参数');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    displayPoetry(result.data);
                } else {
                    showError(result.message || '诗词不存在');
                }
            } catch (error) {
                console.error('Error loading poetry:', error);
                showError('网络错误，请稍后重试');
            }
        }

        // 显示诗词
        function displayPoetry(poetry) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('poetry-detail').style.display = 'block';

            // 设置标题
            document.getElementById('title').textContent = poetry.title || '无题';
            
            // 设置朝代
            const dynastyEl = document.getElementById('dynasty');
            if (poetry.dynasty) {
                dynastyEl.textContent = poetry.dynasty;
                dynastyEl.style.display = 'inline-block';
            } else {
                dynastyEl.style.display = 'none';
            }
            
            // 设置作者
            document.getElementById('author').textContent = poetry.author || '无名氏';
            
            // 设置内容
            document.getElementById('content').textContent = poetry.content || '';
            
            // 设置标签
            const tagsContainer = document.getElementById('tags');
            try {
                const tags = JSON.parse(poetry.tags || '[]');
                if (tags && tags.length > 0) {
                    tagsContainer.innerHTML = tags.map(tag => 
                        `<span class="poetry-tag">${tag}</span>`
                    ).join('');
                } else {
                    tagsContainer.style.display = 'none';
                }
            } catch (e) {
                tagsContainer.style.display = 'none';
            }

            // 更新页面标题
            document.title = `${poetry.title} - ${poetry.author || '无名氏'} - 诗词大全`;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadPoetryDetail);
    </script>
</body>
</html>
